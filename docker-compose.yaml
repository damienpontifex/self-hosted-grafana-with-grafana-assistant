services:
  lgtm:
    image: grafana/otel-lgtm:0.28.0
    ports:
      - 3000:3000 # Grafana UI User: admin, password: admin
    environment:
      - ENABLE_LOGS_GRAFANA=true # surface grafana logs on stdout (`docker compose logs lgtm`)
      # Assistant plugin authenticates users to the cloud backend via managed
      # service accounts; both of these are required (off by default).
      - GF_FEATURE_TOGGLES_ENABLE=externalServiceAccounts
      - GF_AUTH_MANAGED_SERVICE_ACCOUNTS_ENABLED=true
      - GF_INSTALL_PLUGINS=grafana-assistant-app
    volumes:
      - grafana-data:/data/grafana

volumes:
  grafana-data:


