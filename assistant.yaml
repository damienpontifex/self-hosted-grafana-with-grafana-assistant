apiVersion: 1
apps:
  - id: grafana-assistant-app
    disabled: false
    jsonData:
      backendUrl: "${GRAFANA_ASSISTANT_BACKEND_URL}"
      instanceId: "${GRAFANA_ASSISTANT_INSTANCE_ID}"
      isAccessTokenSet: true
      ossMode: true
    secureJsonData:
      apiToken: "${GRAFANA_ASSISTANT_ACCESS_TOKEN}"

